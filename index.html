<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volley Club — Premium Pickleball Bookings</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#FAF9F5] text-[#1C2D27]">

    <div id="root"></div>

    <script type="text/babel">
        function VolleyClubApp() {
            const [selectedDate, setSelectedDate] = React.useState('Wed, Jun 10');
            const [selectedCourt, setSelectedCourt] = React.useState('Court 1 — Indoor · Championship');
            const [selectedTime, setSelectedTime] = React.useState('');
            const [paddles, setPaddles] = React.useState(0);
            const [balls, setBalls] = React.useState(0);
            const [bookingSuccess, setBookingSuccess] = React.useState(false);

            const courtFee = 45.00;
            const paddlePrice = 8.00;
            const ballPrice = 5.00;

            const dates = [
                { label: 'Wed, Jun 10', day: '10', name: 'Wed' },
                { label: 'Thu, Jun 11', day: '11', name: 'Thu' },
                { label: 'Fri, Jun 12', day: '12', name: 'Fri' },
                { label: 'Sat, Jun 13', day: '13', name: 'Sat' },
                { label: 'Sun, Jun 14', day: '14', name: 'Sun' }
            ];

            const courts = [
                { id: 'c1', name: 'Court 1 — Indoor · Championship', details: 'Pro cushioning, premium climate control' },
                { id: 'c2', name: 'Court 2 — Outdoor · Stadium', details: 'Clear views, professional court surfacing' }
            ];

            const timeSlots = ['08:00 AM', '09:00 AM', '10:00 AM', '11:00 AM', '01:00 PM', '02:00 PM', '03:00 PM', '04:00 PM', '05:00 PM', '06:00 PM'];

            const totalPrice = courtFee + (paddles * paddlePrice) + (balls * ballPrice);

            const handleBookNow = () => {
                if (!selectedTime) {
                    alert("Please select an available time slot before finalizing your reservation.");
                    return;
                }
                setBookingSuccess(true);
                setTimeout(() => setBookingSuccess(false), 6000);
            };

            return (
                <div id="top" className="min-h-screen bg-[#FAF9F5] text-[#1C2D27] font-sans antialiased">
                    
                    {bookingSuccess && (
                        <div className="fixed bottom-6 right-6 z-50 max-w-md bg-[#1C2D27] text-[#FAF9F5] p-5 rounded-2xl shadow-2xl border border-lime-400/30 flex items-start gap-4">
                            <div className="text-lime-400 text-xl font-bold">✓</div>
                            <div>
                                <h4 className="font-bold text-lg text-white">Reservation Submitted!</h4>
                                <p className="text-sm text-[#FAF9F5]/80 mt-1">
                                    A confirmation request has been dispatched to management.
                                </p>
                            </div>
                        </div>
                    )}

                    <header className="sticky top-0 z-40 bg-[#FAF9F5]/90 backdrop-blur-md border-b border-[#1C2D27]/5">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <a href="#top" className="flex items-center gap-2 font-black text-2xl tracking-tight text-[#1C2D27]">
                                <span className="w-3 h-3 bg-lime-400 rounded-full inline-block"></span>
                                Volley Club
                            </a>
                            <nav className="hidden md:flex items-center gap-8 font-semibold text-sm tracking-wide text-[#1C2D27]/80">
                                <a href="#book" className="hover:text-[#1C2D27] transition-colors">Book</a>
                                <a href="#contact" className="hover:text-[#1C2D27] transition-colors">Contact</a>
                            </nav>
                            <a href="#book" className="bg-[#1C2D27] text-white hover:bg-[#253B33] px-5 py-2.5 rounded-full font-bold text-sm transition-all shadow-sm">
                                Book a Court
                            </a>
                        </div>
                    </header>

                    <section className="max-w-7xl mx-auto px-6 py-12 lg:py-24 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
                        <div className="lg:col-span-7 space-y-8">
                            <span className="inline-flex items-center gap-2 bg-[#1C2D27]/5 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider text-[#1C2D27]">
                                <span className="w-1.5 h-1.5 bg-[#1C2D27] rounded-full"></span>
                                Now booking — Summer season
                            </span>
                            <h1 className="text-5xl lg:text-7xl font-black tracking-tighter leading-none text-[#1C2D27]">
                                Your court.<br />Your time.<br /><span className="text-[#1C2D27]/40">Your game.</span>
                            </h1>
                            <p className="text-lg lg:text-xl text-[#1C2D27]/70 font-normal max-w-xl leading-relaxed">
                                Welcome, player. Reserve a premium pickleball court in under a minute — pro surfaces, perfect lighting, and gear ready when you arrive.
                            </p>
                            <div className="flex flex-wrap items-center gap-4 pt-2">
                                <a href="#book" className="bg-[#1C2D27] text-white hover:bg-[#253B33] px-8 py-4 rounded-full font-bold text-base transition-all shadow-md">
                                    Book a Court
                                </a>
                            </div>
                        </div>
                        
                        <div className="lg:col-span-5 relative">
                            <div className="rounded-3xl overflow-hidden shadow-2xl relative aspect-[4/3] bg-emerald-900/30">
                                <div className="absolute inset-0 bg-gradient-to-t from-[#1C2D27]/80 via-transparent to-transparent z-10"></div>
                                <div className="absolute bottom-6 left-6 z-20 text-white">
                                    <div className="text-xs uppercase font-bold tracking-widest text-lime-400 mb-1">Featured court</div>
                                    <div className="text-xl font-bold">Center Court · Indoor</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="book" className="bg-white border-y border-[#1C2D27]/5 py-20">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="mb-12 max-w-xl">
                                <span className="text-xs uppercase font-black tracking-widest text-[#1C2D27]/50">Booking engine</span>
                                <h2 className="text-3xl lg:text-5xl font-black tracking-tight text-[#1C2D27] mt-2">Reserve your court.</h2>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
                                <div className="lg:col-span-8 space-y-10">
                                    <div className="space-y-4">
                                        <h3 className="font-bold text-lg text-[#1C2D27]">01. Select a date</h3>
                                        <div className="grid grid-cols-5 gap-3">
                                            {dates.map((d) => (
                                                <button key={d.label} onClick={() => setSelectedDate(d.label)} className={`p-4 rounded-2xl flex flex-col items-center justify-center border transition-all ${selectedDate === d.label ? 'bg-[#1C2D27] text-white' : 'border-[#1C2D27]/10 bg-white text-[#1C2D27]'}`}>
                                                    <span className="text-xs opacity-60 uppercase mb-1">{d.name}</span>
                                                    <span className="text-xl font-black">{d.day}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <h3 className="font-bold text-lg text-[#1C2D27]">02. Select a court</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {courts.map((court) => (
                                                <button key={court.name} onClick={() => setSelectedCourt(court.name)} className={`p-5 rounded-2xl text-left border transition-all ${selectedCourt === court.name ? 'bg-[#1C2D27] text-white' : 'border-[#1C2D27]/10 bg-white text-[#1C2D27]'}`}>
                                                    <div className="font-bold text-base">{court.name}</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <h3 className="font-bold text-lg text-[#1C2D27]">03. Available times</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                                            {timeSlots.map((time) => (
                                                <button key={time} onClick={() => setSelectedTime(time)} className={`py-3 px-4 rounded-xl font-bold text-sm text-center border transition-all ${selectedTime === time ? 'bg-lime-400 text-[#1C2D27]' : 'border-[#1C2D27]/10 bg-white'}`}>
                                                    {time}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:col-span-4 bg-[#1C2D27] text-white p-6 rounded-3xl space-y-6 shadow-xl">
                                    <h3 className="text-xl font-black tracking-tight">Your reservation</h3>
                                    <div className="space-y-3 text-sm border-t border-b border-white/10 py-4">
                                        <div className="flex justify-between"><span>Date</span><span>{selectedDate}</span></div>
                                        <div className="flex justify-between"><span>Court</span><span className="truncate max-w-[150px]">{selectedCourt}</span></div>
                                        <div className="flex justify-between"><span>Time</span><span className="text-lime-400 font-bold">{selectedTime || '—'}</span></div>
                                        <div className="flex justify-between text-xs opacity-60"><span>Court Fee</span><span>${courtFee.toFixed(2)}</span></div>
                                    </div>
                                    <div className="flex justify-between items-baseline">
                                        <span className="font-bold">Total</span>
                                        <span className="text-3xl font-black text-lime-400">${totalPrice.toFixed(2)}</span>
                                    </div>
                                    <button onClick={handleBookNow} className="w-full bg-lime-400 text-[#1C2D27] py-4 rounded-xl font-black tracking-wide text-center cursor-pointer hover:bg-lime-300 transition-colors">
                                        Book Now
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VolleyClubApp />);
    </script>
</body>
</html>
